<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#c0c0c0">
<title>Little Field</title>
<style>
:root{
  --win-bg:#c0c0c0;
  --win-title:#000080;
  --win-title-text:#fff;
  --win-border-light:#dfdfdf;
  --win-border-dark:#808080;
  --win-border-darker:#404040;
  --win-face:#c0c0c0;
  --desktop:#008080;
  --live:#cc0000;
  --rec:#cc4400;
  --note-bg:#ffffe1;
  --mono:'Courier New',Courier,monospace;
  --sys:'Segoe UI','Tahoma','Geneva',sans-serif;
  --taskbar-h:36px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--desktop);font-family:var(--sys);font-size:12px;
  -webkit-user-select:none;user-select:none;cursor:default}

/* DESKTOP CANVAS */
#desktop{position:fixed;inset:0;bottom:var(--taskbar-h);overflow:hidden}

/* WINDOW */
.win{position:absolute;background:var(--win-face);min-width:180px;
  border:2px solid;border-color:var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
  box-shadow:1px 1px 0 var(--win-border-darker);z-index:10;display:flex;flex-direction:column}
.win.focused{z-index:100}
.win-title{display:flex;align-items:center;gap:4px;padding:2px 3px;
  background:linear-gradient(90deg,var(--win-title),#1084d0);color:var(--win-title-text);
  font-size:11px;font-weight:700;cursor:move;white-space:nowrap;overflow:hidden}
.win.unfocused .win-title{background:linear-gradient(90deg,#808080,#b0b0b0)}
.win-title span{flex:1;overflow:hidden;text-overflow:ellipsis;padding:0 2px}
.win-btn{width:16px;height:14px;background:var(--win-face);border:1px solid;
  border-color:var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  font-size:9px;line-height:12px;text-align:center;cursor:pointer;color:#000;font-family:var(--mono);flex-shrink:0}
.win-btn:active{border-color:var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark)}
.win-body{padding:6px;flex:1;overflow:auto;font-size:11px}

/* NOTE WINDOW */
.note-body{background:var(--note-bg);padding:8px;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;
  min-height:40px;border:1px inset var(--win-border-dark)}
.note-meta{font-size:9px;color:#888;padding:3px 0 0;font-family:var(--mono)}

/* PLAYER WINDOW (Winamp-style) */
.player{width:260px}
.player .win-body{padding:0;background:#232323;color:#00ff00;font-family:var(--mono)}
.player-display{padding:6px 8px;background:#0a0a14;margin:4px;border:1px inset #444;min-height:30px}
.player-title-scroll{font-size:10px;color:#00cc00;white-space:nowrap;overflow:hidden}
.player-time{font-size:18px;color:#00ff00;font-family:var(--mono);margin-top:2px}
.player-controls{display:flex;align-items:center;justify-content:center;gap:2px;padding:4px 6px}
.player-controls button{width:28px;height:18px;font-size:9px;background:#3a3a3a;color:#ccc;border:1px solid;
  border-color:#555 #222 #222 #555;cursor:pointer;font-family:var(--mono)}
.player-controls button:hover{background:#555}
.player-controls button.active{background:#00aa00;color:#000}
.player-progress{margin:0 6px 4px;height:8px;background:#0a0a14;border:1px inset #444;cursor:pointer;position:relative}
.player-progress-fill{height:100%;background:#00aa00;pointer-events:none}
.player-vol{display:flex;align-items:center;gap:4px;padding:0 6px 4px;font-size:9px;color:#888}
.player-vol input{width:60px;height:6px;-webkit-appearance:none;appearance:none;background:#0a0a14;outline:none;cursor:pointer}
.player-vol input::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:14px;background:#aaa;border:1px solid #666}

/* RECORDER WINDOW */
.recorder{width:240px}
.recorder .win-body{padding:8px;background:#1a1a1a;color:#ddd;font-family:var(--mono);text-align:center}
.rec-timer{font-size:22px;color:#ff4444;font-family:var(--mono);margin:8px 0}
.rec-btn{width:48px;height:48px;border-radius:50%;border:3px solid #666;background:#aa0000;color:#fff;
  font-size:10px;cursor:pointer;font-family:var(--mono);margin:8px auto;display:block}
.rec-btn:hover{background:#cc0000}
.rec-btn.recording{background:#ff0000;animation:pulse-rec 1s infinite}
.rec-btn.stopped{background:#444;border-color:#555}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 #ff000060}50%{box-shadow:0 0 0 8px #ff000000}}
.rec-status{font-size:10px;color:#888;margin-top:4px}

/* LIVE WINDOW */
.live-win{width:220px}
.live-win .win-title{background:linear-gradient(90deg,#aa0000,#cc4400) !important}
.live-body{padding:8px;background:#1a1a1a;color:#ddd;font-family:var(--mono);text-align:center}
.live-indicator{font-size:14px;color:#ff0000;font-weight:700;animation:pulse-rec 1.2s infinite}
.live-bars{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:30px;margin:8px 0}
.live-bar{width:4px;background:#00cc00;border-radius:1px;transition:height .1s}

/* ZINE WINDOW */
.zine-win{width:300px;height:400px}
.zine-win .win-body{padding:0;display:flex;flex-direction:column}
.zine-win iframe{flex:1;border:none;background:#fff}
.zine-nav{display:flex;gap:4px;padding:4px;background:var(--win-face);border-top:1px solid var(--win-border-dark)}
.zine-nav button{font-size:10px;padding:2px 8px;background:var(--win-face);border:1px solid;
  border-color:var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);cursor:pointer}

/* GATE / LOGIN */
.gate{position:fixed;inset:0;z-index:9999;background:var(--desktop);display:flex;align-items:center;justify-content:center}
.gate-box{background:var(--win-face);border:2px solid;
  border-color:var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
  width:360px;max-width:90vw}
.gate-title{padding:3px 5px;background:linear-gradient(90deg,var(--win-title),#1084d0);
  color:#fff;font-size:11px;font-weight:700}
.gate-body{padding:20px}
.gate-body label{font-size:11px;display:block;margin-bottom:4px}
.gate-body input[type=text]{width:100%;padding:3px 4px;border:2px solid;
  border-color:var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
  font-size:12px;font-family:var(--sys);margin-bottom:12px;background:#fff}
.gate-body input[type=text]:focus{outline:none}
.gate-roles{display:flex;gap:8px;margin-bottom:16px}
.gate-role{flex:1;padding:10px;border:2px solid;cursor:pointer;text-align:center;
  border-color:var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  background:var(--win-face);font-size:11px}
.gate-role:hover{background:#d4d4d4}
.gate-role.selected{background:var(--win-title);color:#fff;border-color:var(--win-title)}
.gate-role .role-icon{font-size:20px;margin-bottom:4px}
.gate-role .role-name{font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.06em}
.gate-role .role-desc{font-size:9px;margin-top:3px;opacity:.8}
.gate-enter{width:100%;padding:6px;background:var(--win-face);border:2px solid;
  border-color:var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  font-size:12px;font-family:var(--sys);cursor:pointer;font-weight:700}
.gate-enter:hover{background:#d4d4d4}
.gate-enter:active{border-color:var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark)}

/* TASKBAR */
.taskbar{position:fixed;bottom:0;left:0;right:0;height:var(--taskbar-h);z-index:200;
  background:var(--win-face);border-top:2px solid var(--win-border-light);
  display:flex;align-items:center;padding:2px 4px;gap:2px}
.start-btn{display:flex;align-items:center;gap:3px;padding:2px 6px;height:28px;
  background:var(--win-face);border:2px solid;font-weight:700;font-size:11px;cursor:pointer;
  border-color:var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light)}
.start-btn:active,.start-btn.pressed{border-color:var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark)}
.start-btn .start-icon{font-size:14px}
.task-sep{width:2px;height:24px;border-left:1px solid var(--win-border-dark);border-right:1px solid var(--win-border-light);margin:0 2px}
.task-items{flex:1;display:flex;gap:2px;overflow-x:auto;min-width:0}
.task-item{height:24px;padding:0 8px;font-size:10px;background:var(--win-face);border:2px solid;
  border-color:var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
  cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;
  display:flex;align-items:center;gap:3px}
.task-item.active{border-color:var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);background:#b0b0b0}
.task-clock{font-family:var(--mono);font-size:11px;padding:0 8px;height:24px;display:flex;align-items:center;
  border:2px solid;border-color:var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
  min-width:70px;justify-content:center;gap:8px}
.task-users{font-size:9px;color:#555}

/* START MENU */
.start-menu{position:fixed;bottom:var(--taskbar-h);left:0;z-index:300;background:var(--win-face);
  border:2px solid;border-color:var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
  width:200px;display:none;box-shadow:2px 2px 0 #00000040}
.start-menu.open{display:block}
.start-menu-header{background:linear-gradient(180deg,var(--win-title),#1084d0);color:#fff;
  padding:8px;font-size:11px;font-weight:700;writing-mode:vertical-lr;transform:rotate(180deg);
  position:absolute;left:0;top:0;bottom:0;width:24px;display:flex;align-items:center;justify-content:flex-end;letter-spacing:.1em}
.start-menu-items{margin-left:24px;padding:4px 0}
.start-item{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:11px;cursor:pointer}
.start-item:hover{background:var(--win-title);color:#fff}
.start-item .si-icon{font-size:16px;width:20px;text-align:center}
.start-sep{height:1px;background:var(--win-border-dark);margin:4px 12px 4px 36px}
.start-item.disabled{color:#888;cursor:default}
.start-item.disabled:hover{background:transparent;color:#888}

/* CONTEXT MENU */
.ctx-menu{position:fixed;z-index:400;background:var(--win-face);border:2px solid;
  border-color:var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
  box-shadow:2px 2px 0 #00000040;display:none;min-width:140px}
.ctx-menu.open{display:block}
.ctx-item{padding:4px 20px;font-size:11px;cursor:pointer}
.ctx-item:hover{background:var(--win-title);color:#fff}

/* SCROLL */
::-webkit-scrollbar{width:14px}
::-webkit-scrollbar-track{background:var(--win-face);border:1px solid var(--win-border-dark)}
::-webkit-scrollbar-thumb{background:var(--win-face);border:2px solid;
  border-color:var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light)}
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-title">Welcome to Little Field</div>
    <div class="gate-body">
      <label for="nameInput">Your name:</label>
      <input type="text" id="nameInput" placeholder="anonymous" maxlength="24">
      <label>Join as:</label>
      <div class="gate-roles">
        <div class="gate-role selected" data-role="contributor" onclick="selectRole(this)">
          <div class="role-icon">&#9998;</div>
          <div class="role-name">Contributor</div>
          <div class="role-desc">Drop notes, record, upload, go live</div>
        </div>
        <div class="gate-role" data-role="listener" onclick="selectRole(this)">
          <div class="role-icon">&#9835;</div>
          <div class="role-name">Listener</div>
          <div class="role-desc">Browse, read &amp; listen only</div>
        </div>
      </div>
      <button class="gate-enter" id="enterBtn">Enter the Field</button>
    </div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop"></div>

<!-- TASKBAR -->
<div class="taskbar" id="taskbar" style="display:none">
  <button class="start-btn" id="startBtn" onclick="toggleStart()">
    <span class="start-icon">&#127793;</span> Field
  </button>
  <div class="task-sep"></div>
  <div class="task-items" id="taskItems"></div>
  <div class="task-clock">
    <span id="clock">00:00</span>
    <span class="task-users" id="taskUsers">0</span>
  </div>
</div>

<!-- START MENU -->
<div class="start-menu" id="startMenu">
  <div class="start-menu-header">LITTLE FIELD</div>
  <div class="start-menu-items">
    <div class="start-item contributor-only" onclick="doAction('note')"><span class="si-icon">&#128221;</span> Drop a Note</div>
    <div class="start-item contributor-only" onclick="doAction('record')"><span class="si-icon">&#9210;</span> Record Audio</div>
    <div class="start-item contributor-only" onclick="doAction('upload')"><span class="si-icon">&#127925;</span> Upload MP3</div>
    <div class="start-item contributor-only" onclick="doAction('live')"><span class="si-icon">&#127908;</span> Go Live</div>
    <div class="start-sep"></div>
    <div class="start-item contributor-only" onclick="doAction('zine')"><span class="si-icon">&#128214;</span> Upload Zine (PDF)</div>
    <div class="start-sep"></div>
    <div class="start-item" onclick="doAction('about')"><span class="si-icon">&#8505;</span> About</div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu"></div>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="audioFileInput" accept="audio/*" style="display:none">
<input type="file" id="zineFileInput" accept=".pdf" style="display:none">

<script src="/socket.io/socket.io.js"></script>
<script>
// ---- STATE ------------------------------------------------------------------
const state = {
  userId: null, userName: '', role: 'contributor',
  panX: 0, panY: 0, zoom: 1
};
let socket = null;
const wins = new Map();
let winZ = 10;
let focusedWin = null;
let startOpen = false;
let audioCtx = null;
let userCount = 0;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ---- GATE -------------------------------------------------------------------
let selectedRole = 'contributor';
function selectRole(el) {
  document.querySelectorAll('.gate-role').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  selectedRole = el.dataset.role;
}

document.getElementById('enterBtn').addEventListener('click', enterField);
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') enterField(); });

function enterField() {
  ensureAudio();
  state.userName = document.getElementById('nameInput').value.trim() || 'anonymous';
  state.role = selectedRole;
  document.getElementById('gate').style.display = 'none';
  document.getElementById('taskbar').style.display = 'flex';

  if (state.role === 'listener') {
    document.querySelectorAll('.contributor-only').forEach(el => {
      el.classList.add('disabled');
      el.onclick = null;
    });
  }

  connectSocket();
}

// ---- SOCKET -----------------------------------------------------------------
function connectSocket() {
  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    socket.emit('join-room', { roomId: 'default', name: state.userName });
  });

  socket.on('room-state', data => {
    state.userId = data.userId;
    userCount = data.users.length;
    updateTaskUsers();
    data.stations.forEach(st => {
      if (!wins.has(st.id)) createPlayerFromServer(st);
    });
    data.notes.forEach(n => {
      if (!wins.has(n.id)) createNoteFromServer(n);
    });
    if (data.zines) data.zines.forEach(z => {
      if (!wins.has(z.id)) createZineFromServer(z);
    });
  });

  socket.on('user-count', c => { userCount = c; updateTaskUsers(); });
  socket.on('user-joined', () => {});
  socket.on('user-left', () => {});

  socket.on('note-placed', n => {
    if (!wins.has(n.id)) createNoteFromServer(n);
  });
  socket.on('note-removed', id => { removeWin(id); });

  socket.on('station-placed', st => {
    if (!wins.has(st.id)) createPlayerFromServer(st);
  });
  socket.on('station-removed', id => { removeWin(id); });
  socket.on('station-audio', data => {
    const w = wins.get(data.stationId);
    if (w && data.audioFileId) {
      w.audioFileId = data.audioFileId;
      loadAudioForWin(w);
    }
  });
  socket.on('station-live', data => {
    const w = wins.get(data.stationId);
    if (w) { w.live = true; w.type = 'live'; updateWinTitle(w); }
  });
  socket.on('station-off-air', id => {
    const w = wins.get(id);
    if (w) { w.live = false; w.type = w.audioFileId ? 'recording' : 'empty'; updateWinTitle(w); }
  });
  socket.on('station-broadcast', data => {
    const w = wins.get(data.stationId);
    if (w) { w.type = 'broadcast'; w.broadcastUrl = data.broadcastUrl; updateWinTitle(w); }
  });
  socket.on('station-updated', data => {
    const w = wins.get(data.id);
    if (w) { w.name = data.name; updateWinTitle(w); }
  });

  socket.on('zine-placed', z => {
    if (!wins.has(z.id)) createZineFromServer(z);
  });
  socket.on('zine-removed', id => { removeWin(id); });

  socket.on('live-audio', data => {
    // receive live PCM and play it
    const w = wins.get(data.stationId);
    if (w && w.type === 'live' && data.audio) playLivePCM(w, data.audio);
  });

  socket.on('kicked', msg => {
    alert(msg);
    location.reload();
  });
}

function updateTaskUsers() {
  document.getElementById('taskUsers').textContent = userCount + ' online';
}

// ---- WINDOW SYSTEM ----------------------------------------------------------
function createWin(opts) {
  const el = document.createElement('div');
  el.className = 'win ' + (opts.extraClass || '');
  el.style.left = (opts.x || 100) + 'px';
  el.style.top = (opts.y || 100) + 'px';
  if (opts.width) el.style.width = opts.width + 'px';

  const titleBar = document.createElement('div');
  titleBar.className = 'win-title';
  const titleText = document.createElement('span');
  titleText.textContent = opts.title || 'Window';
  titleBar.appendChild(titleText);

  if (opts.closable !== false) {
    const closeBtn = document.createElement('div');
    closeBtn.className = 'win-btn';
    closeBtn.textContent = 'X';
    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (opts.onClose) opts.onClose();
      else removeWin(opts.id);
    });
    titleBar.appendChild(closeBtn);
  }

  const body = document.createElement('div');
  body.className = 'win-body';

  el.appendChild(titleBar);
  el.appendChild(body);
  document.getElementById('desktop').appendChild(el);

  // dragging
  let dragging = false, dx = 0, dy = 0;
  titleBar.addEventListener('pointerdown', e => {
    dragging = true;
    dx = e.clientX - el.offsetLeft;
    dy = e.clientY - el.offsetTop;
    focusWin(opts.id);
    e.preventDefault();
  });
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    el.style.left = (e.clientX - dx) + 'px';
    el.style.top = (e.clientY - dy) + 'px';
  });
  window.addEventListener('pointerup', () => { dragging = false; });

  el.addEventListener('pointerdown', () => focusWin(opts.id));

  const w = {
    id: opts.id, el, body, titleText, type: opts.type || 'generic',
    name: opts.title, taskLabel: opts.taskLabel || opts.title,
    ...opts.data
  };
  wins.set(opts.id, w);
  focusWin(opts.id);
  updateTaskbar();
  return w;
}

function focusWin(id) {
  wins.forEach(w => w.el.classList.remove('focused'));
  wins.forEach(w => w.el.classList.add('unfocused'));
  const w = wins.get(id);
  if (w) {
    w.el.classList.add('focused');
    w.el.classList.remove('unfocused');
    w.el.style.zIndex = ++winZ;
    focusedWin = id;
  }
  updateTaskbar();
}

function hideWin(id) {
  const w = wins.get(id);
  if (!w) return;
  w.el.style.display = 'none';
  w._hidden = true;
  updateTaskbar();
}

function removeWin(id) {
  const w = wins.get(id);
  if (!w) return;
  if (w._audio) { w._audio.pause(); w._audio.src = ''; }
  if (w._stream) { w._stream.getTracks().forEach(t => t.stop()); }
  w.el.remove();
  wins.delete(id);
  updateTaskbar();
}

function updateWinTitle(w) {
  if (!w) return;
  let t = w.name || 'untitled';
  if (w.live) t += ' [LIVE]';
  else if (w.type === 'broadcast') t += ' [BROADCAST]';
  else if (w.type === 'recording') t += ' [PLAYING]';
  w.titleText.textContent = t;
  w.taskLabel = t;
  updateTaskbar();
}

// ---- TASKBAR ----------------------------------------------------------------
function updateTaskbar() {
  const container = document.getElementById('taskItems');
  container.innerHTML = '';
  wins.forEach(w => {
    const btn = document.createElement('div');
    btn.className = 'task-item' + (focusedWin === w.id ? ' active' : '');
    const icons = { note: '&#128221;', player: '&#127925;', recorder: '&#9210;', live: '&#127908;', zine: '&#128214;', about: '&#8505;' };
    btn.innerHTML = '<span>' + (icons[w.type] || '') + '</span> ' + esc(w.taskLabel || w.name || w.id);
    btn.addEventListener('click', () => {
      if (focusedWin === w.id) {
        w.el.style.display = w.el.style.display === 'none' ? 'flex' : 'none';
      } else {
        w.el.style.display = 'flex';
        focusWin(w.id);
      }
    });
    container.appendChild(btn);
  });
}

// ---- START MENU -------------------------------------------------------------
function toggleStart() {
  startOpen = !startOpen;
  document.getElementById('startMenu').classList.toggle('open', startOpen);
  document.getElementById('startBtn').classList.toggle('pressed', startOpen);
}
document.addEventListener('click', e => {
  if (startOpen && !e.target.closest('.start-menu') && !e.target.closest('.start-btn')) {
    startOpen = false;
    document.getElementById('startMenu').classList.remove('open');
    document.getElementById('startBtn').classList.remove('pressed');
  }
  if (!e.target.closest('.ctx-menu')) {
    document.getElementById('ctxMenu').classList.remove('open');
  }
});

// ---- ACTIONS ----------------------------------------------------------------
function doAction(action) {
  startOpen = false;
  document.getElementById('startMenu').classList.remove('open');
  document.getElementById('startBtn').classList.remove('pressed');

  if (state.role === 'listener' && action !== 'about') return;

  switch (action) {
    case 'note': openNoteComposer(); break;
    case 'record': openRecorder(); break;
    case 'upload': document.getElementById('audioFileInput').click(); break;
    case 'live': goLive(); break;
    case 'zine': document.getElementById('zineFileInput').click(); break;
    case 'about': openAbout(); break;
  }
}

// ---- PLAYER (MP3) -----------------------------------------------------------
function createPlayerFromServer(st) {
  const w = createWin({
    id: st.id, title: st.name || 'untitled', type: 'player',
    extraClass: 'player', x: st.x || 100, y: st.y || 100,
    onClose: () => {
      if (st.owner === state.userId) {
        if (confirm('Delete this station for everyone?')) {
          socket.emit('remove-station', st.id);
          removeWin(st.id);
        }
      } else {
        hideWin(st.id);
      }
    },
    data: { audioFileId: st.audioFileId, live: st.live, stationType: st.type, owner: st.owner, name: st.name }
  });

  w.body.innerHTML = `
    <div class="player-display">
      <div class="player-title-scroll">${esc(st.name || 'untitled')}</div>
      <div class="player-time">0:00</div>
    </div>
    <div class="player-controls">
      <button onclick="playerCmd('${st.id}','prev')" title="Previous">|&lt;</button>
      <button onclick="playerCmd('${st.id}','play')" title="Play">&#9654;</button>
      <button onclick="playerCmd('${st.id}','pause')" title="Pause">||</button>
      <button onclick="playerCmd('${st.id}','stop')" title="Stop">&#9632;</button>
      <button onclick="playerCmd('${st.id}','next')" title="Next">&gt;|</button>
    </div>
    <div class="player-progress" onclick="playerSeek(event,'${st.id}')">
      <div class="player-progress-fill" style="width:0%"></div>
    </div>
    <div class="player-vol">
      vol <input type="range" min="0" max="100" value="80" oninput="playerVol('${st.id}',this.value)">
    </div>`;

  if (st.audioFileId) {
    w.audioFileId = st.audioFileId;
    loadAudioForWin(w);
  }
  if (st.live) {
    w.live = true; w.type = 'live';
  }
  updateWinTitle(w);
}

function loadAudioForWin(w) {
  if (!w.audioFileId) return;
  if (w._audio) { w._audio.pause(); w._audio.src = ''; }
  const audio = new Audio('/api/audio/' + w.audioFileId);
  audio.loop = true;
  audio.volume = 0.8;
  w._audio = audio;
  w.type = 'player';

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration * 100).toFixed(1);
    const fill = w.body.querySelector('.player-progress-fill');
    if (fill) fill.style.width = pct + '%';
    const m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60);
    const timeEl = w.body.querySelector('.player-time');
    if (timeEl) timeEl.textContent = m + ':' + s.toString().padStart(2, '0');
  });

  audio.play().catch(() => {});
  updateWinTitle(w);
}

function playerCmd(id, cmd) {
  ensureAudio();
  const w = wins.get(id);
  if (!w || !w._audio) return;
  switch (cmd) {
    case 'play': w._audio.play().catch(() => {}); break;
    case 'pause': w._audio.pause(); break;
    case 'stop': w._audio.pause(); w._audio.currentTime = 0; break;
    case 'prev': w._audio.currentTime = Math.max(0, w._audio.currentTime - 10); break;
    case 'next': w._audio.currentTime = Math.min(w._audio.duration || 0, w._audio.currentTime + 10); break;
  }
}

function playerSeek(e, id) {
  const w = wins.get(id);
  if (!w || !w._audio || !w._audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  w._audio.currentTime = pct * w._audio.duration;
}

function playerVol(id, val) {
  const w = wins.get(id);
  if (w && w._audio) w._audio.volume = val / 100;
}

// ---- UPLOAD MP3 -------------------------------------------------------------
document.getElementById('audioFileInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const x = 100 + Math.random() * 400;
  const y = 80 + Math.random() * 300;

  socket.emit('place-station', { name: file.name.replace(/\.[^.]+$/, ''), x, y, reach: 460 });

  // wait for station-placed event
  const handler = async (st) => {
    if (st.owner !== state.userId) return;
    socket.off('station-placed', handler);

    const fd = new FormData();
    fd.append('audio', file);
    const res = await fetch('/api/audio/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.fileId) {
      socket.emit('station-audio', { stationId: st.id, audioFileId: data.fileId });
    }
  };
  socket.on('station-placed', handler);
});

// ---- RECORDER ---------------------------------------------------------------
function openRecorder() {
  const id = '_rec_' + Date.now();
  const w = createWin({
    id, title: 'Recorder', type: 'recorder', extraClass: 'recorder',
    x: 200 + Math.random() * 200, y: 100 + Math.random() * 150, width: 240,
    onClose: () => {
      if (w._stream) w._stream.getTracks().forEach(t => t.stop());
      if (w._recorder && w._recorder.state === 'recording') w._recorder.stop();
      removeWin(id);
    }
  });
  w.body.innerHTML = `
    <div class="rec-timer">0:00</div>
    <button class="rec-btn" onclick="toggleRecording('${id}')">REC</button>
    <div class="rec-status">click to start recording</div>`;
  w._recording = false;
  w._startTime = 0;
}

async function toggleRecording(id) {
  ensureAudio();
  const w = wins.get(id);
  if (!w) return;

  if (!w._recording) {
    // start
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      w._stream = stream;
      const recorder = new MediaRecorder(stream);
      w._recorder = recorder;
      const chunks = [];
      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.onstop = async () => {
        w._stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: recorder.mimeType });
        clearInterval(w._timerInt);

        w.body.querySelector('.rec-status').textContent = 'uploading...';
        w.body.querySelector('.rec-btn').className = 'rec-btn stopped';
        w.body.querySelector('.rec-btn').textContent = '...';

        // place station and upload
        const x = parseInt(w.el.style.left) || 200;
        const y = parseInt(w.el.style.top) || 200;
        socket.emit('place-station', { name: 'recording ' + new Date().toLocaleTimeString(), x, y, reach: 460 });

        const handler = async (st) => {
          if (st.owner !== state.userId) return;
          socket.off('station-placed', handler);
          const fd = new FormData();
          fd.append('audio', blob, 'recording.webm');
          const res = await fetch('/api/audio/upload', { method: 'POST', body: fd });
          const data = await res.json();
          if (data.fileId) {
            socket.emit('station-audio', { stationId: st.id, audioFileId: data.fileId });
          }
          removeWin(id);
        };
        socket.on('station-placed', handler);
      };

      recorder.start();
      w._recording = true;
      w._startTime = Date.now();
      w.body.querySelector('.rec-btn').className = 'rec-btn recording';
      w.body.querySelector('.rec-btn').textContent = 'STOP';
      w.body.querySelector('.rec-status').textContent = 'recording...';
      w._timerInt = setInterval(() => {
        const sec = Math.floor((Date.now() - w._startTime) / 1000);
        const m = Math.floor(sec / 60), s = sec % 60;
        w.body.querySelector('.rec-timer').textContent = m + ':' + s.toString().padStart(2, '0');
      }, 200);
    } catch (err) {
      w.body.querySelector('.rec-status').textContent = 'mic access denied';
    }
  } else {
    // stop
    w._recording = false;
    if (w._recorder && w._recorder.state === 'recording') w._recorder.stop();
  }
}

// ---- GO LIVE ----------------------------------------------------------------
function goLive() {
  const id = '_live_' + Date.now();
  const w = createWin({
    id, title: 'Go Live', type: 'live', extraClass: 'live-win',
    x: 200 + Math.random() * 200, y: 100 + Math.random() * 150, width: 220,
    onClose: () => {
      if (w._stationId) socket.emit('stop-on-air', w._stationId);
      if (w._stream) w._stream.getTracks().forEach(t => t.stop());
      removeWin(id);
    }
  });

  w.body.innerHTML = `
    <div class="live-body">
      <div style="margin-bottom:8px">Station name:</div>
      <input type="text" style="width:100%;padding:3px;border:2px inset #888;font-size:11px;margin-bottom:8px"
        id="liveName" placeholder="my live show" maxlength="40">
      <button style="padding:4px 16px;font-size:11px;cursor:pointer" onclick="startLive('${id}')">GO LIVE</button>
    </div>`;
}

async function startLive(id) {
  ensureAudio();
  const w = wins.get(id);
  if (!w) return;

  const name = w.body.querySelector('#liveName').value.trim() || 'live session';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    w._stream = stream;

    const x = parseInt(w.el.style.left) || 200;
    const y = parseInt(w.el.style.top) || 200;
    socket.emit('place-station', { name, x, y, reach: 460 });

    const handler = (st) => {
      if (st.owner !== state.userId) return;
      socket.off('station-placed', handler);
      w._stationId = st.id;
      socket.emit('go-on-air', st.id);

      w.body.innerHTML = `
        <div class="live-body">
          <div class="live-indicator">&#9679; ON AIR</div>
          <div class="live-bars" id="liveBars_${id}">
            ${Array(16).fill(0).map(() => '<div class="live-bar" style="height:2px"></div>').join('')}
          </div>
          <div style="font-size:10px;color:#888">${esc(name)}</div>
          <button style="margin-top:10px;padding:4px 16px;font-size:11px;cursor:pointer;background:#aa0000;color:#fff;border:1px solid #880000"
            onclick="stopLiveWin('${id}')">STOP</button>
        </div>`;

      // send PCM chunks
      const ctx = new AudioContext({ sampleRate: 16000 });
      const src = ctx.createMediaStreamSource(stream);
      const proc = ctx.createScriptProcessor(4096, 1, 1);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 64;
      src.connect(analyser);
      src.connect(proc);
      proc.connect(ctx.destination);
      w._procNode = proc;
      w._analyserNode = analyser;
      w._audioCtx = ctx;

      proc.onaudioprocess = e => {
        const f32 = e.inputBuffer.getChannelData(0);
        const i16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i++) i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
        socket.volatile.emit('live-audio', { stationId: st.id, audio: i16.buffer });
      };

      // visualize
      const bins = new Uint8Array(analyser.frequencyBinCount);
      function drawLive() {
        if (!wins.has(id)) return;
        analyser.getByteFrequencyData(bins);
        const bars = document.querySelectorAll(`#liveBars_${id} .live-bar`);
        bars.forEach((bar, i) => {
          bar.style.height = Math.max(2, bins[i % bins.length] / 255 * 30) + 'px';
        });
        requestAnimationFrame(drawLive);
      }
      drawLive();
    };
    socket.on('station-placed', handler);
  } catch (err) {
    w.body.innerHTML = '<div class="live-body" style="color:#ff4444">Mic access denied</div>';
  }
}

function stopLiveWin(id) {
  const w = wins.get(id);
  if (!w) return;
  if (w._stationId) socket.emit('stop-on-air', w._stationId);
  if (w._stream) w._stream.getTracks().forEach(t => t.stop());
  if (w._procNode) w._procNode.disconnect();
  if (w._audioCtx) w._audioCtx.close();
  removeWin(id);
}

// play incoming live PCM
function playLivePCM(w, buffer) {
  ensureAudio();
  if (!audioCtx) return;
  const i16 = new Int16Array(buffer);
  const f32 = new Float32Array(i16.length);
  for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
  const ab = audioCtx.createBuffer(1, f32.length, 16000);
  ab.getChannelData(0).set(f32);
  const src = audioCtx.createBufferSource();
  src.buffer = ab;
  src.connect(audioCtx.destination);
  src.start();
}
