<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#fafafa">
<title>Community Field</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg:#fafafa;
  --fg:#111;
  --muted:#999;
  --accent:#111;
  --card-bg:#fff;
  --card-border:#e0e0e0;
  --radius:2px;
  --font:'Space Grotesk',system-ui,sans-serif;
  --mono:'Space Mono','Courier New',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 20px rgba(0,0,0,.1),0 8px 40px rgba(0,0,0,.06);
  --toolbar-h:56px;
  --live:#e00;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);font-size:13px;color:var(--fg)}

/* MAP */
#map{position:fixed;inset:0;bottom:var(--toolbar-h);z-index:1}
.leaflet-control-attribution{font-family:var(--mono)!important;font-size:9px!important;opacity:.4}
.leaflet-control-zoom a{font-family:var(--font)!important;border-radius:0!important;border:1px solid var(--card-border)!important;
  background:var(--card-bg)!important;color:var(--fg)!important;width:28px!important;height:28px!important;line-height:26px!important}

/* GATE */
.gate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column}
.gate-inner{max-width:400px;width:90%;text-align:center}
.gate-title{font-size:32px;font-weight:300;letter-spacing:-.02em;margin-bottom:4px}
.gate-sub{font-size:13px;color:var(--muted);margin-bottom:40px;font-weight:300}
.gate-input{width:100%;padding:12px 0;border:none;border-bottom:1px solid var(--card-border);
  font-family:var(--font);font-size:16px;background:transparent;outline:none;text-align:center;color:var(--fg)}
.gate-input::placeholder{color:#ccc}
.gate-input:focus{border-color:var(--fg)}
.gate-btn{margin-top:32px;padding:12px 48px;border:1px solid var(--fg);background:var(--fg);color:var(--bg);
  font-family:var(--font);font-size:13px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;
  transition:all .2s}
.gate-btn:hover{background:transparent;color:var(--fg)}

/* TOOLBAR */
.toolbar{position:fixed;bottom:0;left:0;right:0;height:var(--toolbar-h);z-index:1000;
  background:var(--card-bg);border-top:1px solid var(--card-border);
  display:none;align-items:center;justify-content:center;gap:1px;padding:0 16px}
.toolbar.visible{display:flex}
.tb-btn{height:40px;padding:0 16px;border:none;background:transparent;font-family:var(--font);font-size:11px;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:.04em;
  text-transform:uppercase;transition:color .15s;position:relative;white-space:nowrap}
.tb-btn:hover{color:var(--fg)}
.tb-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.tb-sep{width:1px;height:20px;background:var(--card-border);margin:0 8px}
.tb-info{margin-left:auto;font-size:10px;color:var(--muted);font-family:var(--mono);
  display:flex;align-items:center;gap:12px;letter-spacing:.02em;flex-shrink:0}
.tb-brand{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--fg);margin-right:16px;flex-shrink:0}

/* LIVE PILL */
.live-pill{display:none;align-items:center;gap:5px;padding:4px 10px;background:#1a1a1a;color:#fff;
  font-size:10px;font-family:var(--mono);letter-spacing:.04em;cursor:pointer;margin-left:8px}
.live-pill.visible{display:flex}
.live-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* PIN MARKERS */
.pin-marker{cursor:pointer;transition:transform .15s}
.pin-marker:hover{transform:scale(1.1)}
.pin-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:var(--card-bg);border:1.5px solid var(--fg);border-radius:50%;
  font-size:14px;box-shadow:var(--shadow);transition:all .15s}
.pin-icon.audio{border-color:#2a6;background:#f0faf4}
.pin-icon.photo{border-color:#48c;background:#f0f5fc}
.pin-icon.note{border-color:#c84;background:#fdf8f0}
.pin-icon.drawing{border-color:#84c;background:#f6f0fd}
.pin-icon.live{border-color:var(--live);background:#fff0f0;animation:live-ring 1.5s infinite}
@keyframes live-ring{0%,100%{box-shadow:0 0 0 0 rgba(224,0,0,.2)}50%{box-shadow:0 0 0 8px rgba(224,0,0,0)}}

/* POPUP CARDS */
.leaflet-popup-content-wrapper{border-radius:var(--radius)!important;box-shadow:var(--shadow-lg)!important;
  padding:0!important;border:1px solid var(--card-border)}
.leaflet-popup-content{margin:0!important;min-width:220px;max-width:320px;font-family:var(--font)}
.leaflet-popup-tip{border-top-color:var(--card-bg)!important}
.leaflet-popup-close-button{display:none!important}

.card{overflow:hidden}
.card-img{width:100%;max-height:240px;object-fit:cover;display:block;background:#f0f0f0}
.card-body{padding:14px 16px}
.card-text{font-size:13px;line-height:1.6;color:var(--fg);white-space:pre-wrap;word-break:break-word}
.card-meta{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:8px;
  display:flex;justify-content:space-between;align-items:center}
.card-author{font-weight:500}

/* AUDIO CARD */
.audio-card{padding:16px}
.audio-title{font-size:12px;font-weight:500;margin-bottom:10px;letter-spacing:.02em}
.audio-wave{height:40px;display:flex;align-items:flex-end;gap:2px;margin-bottom:10px}
.audio-bar{width:3px;background:var(--fg);border-radius:1px;transition:height .1s;opacity:.3}
.audio-bar.active{opacity:1}
.audio-controls{display:flex;align-items:center;gap:10px}
.audio-play{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--fg);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.audio-play:hover{background:var(--fg);color:var(--bg)}
.audio-play svg{width:14px;height:14px;fill:currentColor;stroke:none;margin-left:2px}
.audio-time{font-size:11px;font-family:var(--mono);color:var(--muted)}
.audio-vol{width:60px;height:3px;-webkit-appearance:none;appearance:none;background:#e0e0e0;outline:none;cursor:pointer}
.audio-vol::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--fg);border-radius:50%}

/* DRAWING CARD */
.drawing-card{padding:0}
.drawing-card svg{display:block;background:#fff}

/* MODAL OVERLAY */
.modal{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(2px)}
.modal.open{display:flex}
.modal-box{background:var(--card-bg);border:1px solid var(--card-border);width:90%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--card-border);font-size:14px;font-weight:500;
  display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:0 4px}
.modal-close:hover{color:var(--fg)}
.modal-body{padding:20px}
.modal-body label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.modal-body textarea,.modal-body input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--card-border);
  font-family:var(--font);font-size:13px;background:var(--bg);outline:none;resize:vertical;color:var(--fg)}
.modal-body textarea:focus,.modal-body input[type=text]:focus{border-color:var(--fg)}
.modal-body .field-group{margin-bottom:16px}
.modal-submit{width:100%;padding:12px;border:1px solid var(--fg);background:var(--fg);color:var(--bg);
  font-family:var(--font);font-size:12px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;
  margin-top:8px;transition:all .2s}
.modal-submit:hover{background:transparent;color:var(--fg)}

/* DRAW CANVAS OVERLAY */
.draw-overlay{position:fixed;inset:0;bottom:var(--toolbar-h);z-index:1500;display:none;background:rgba(255,255,255,.85)}
.draw-overlay.open{display:block}
.draw-toolbar{position:absolute;top:0;left:0;right:0;display:flex;gap:0;justify-content:center;
  background:var(--card-bg);border-bottom:1px solid var(--card-border);box-shadow:var(--shadow);z-index:10;padding:6px 4px;flex-wrap:wrap}
.draw-toolbar button{height:32px;padding:0 10px;border:none;background:transparent;font-family:var(--font);
  font-size:10px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.draw-toolbar button:hover{color:var(--fg)}
.draw-toolbar button.active{color:var(--fg);background:var(--bg)}
.draw-canvas{position:absolute;top:60px;left:0;right:0;bottom:0;cursor:crosshair}

/* RECORDER */
.rec-circle{width:14px;height:14px;border-radius:50%;border:2px solid currentColor;position:relative}
.rec-circle::after{content:'';position:absolute;inset:3px;border-radius:50%;background:currentColor}

/* UPLOAD PROGRESS */
.upload-toast{position:fixed;bottom:calc(var(--toolbar-h) + 12px);left:50%;transform:translateX(-50%);
  padding:8px 20px;background:var(--fg);color:var(--bg);font-size:11px;font-family:var(--mono);
  z-index:3000;display:none;letter-spacing:.02em}
.upload-toast.visible{display:block}

/* YOU MARKER */
.you-marker{background:none!important;border:none!important}
.you-dot{width:12px;height:12px;background:var(--fg);border-radius:50%;position:relative;
  margin:4px;box-shadow:0 0 0 3px rgba(17,17,17,.15)}
.you-pulse{position:absolute;inset:-8px;border-radius:50%;border:1.5px solid var(--fg);
  animation:you-ping 2s cubic-bezier(0,0,.2,1) infinite;opacity:0}
@keyframes you-ping{0%{transform:scale(.5);opacity:.6}100%{transform:scale(2);opacity:0}}

/* RESPONSIVE */
@media(max-width:600px){
  .tb-btn span{display:none}
  .tb-btn{padding:0 10px}
  .tb-brand{display:none}
  .tb-info{font-size:9px;gap:8px}
}
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-inner">
    <div class="gate-title">Community Field</div>
    <div class="gate-sub">a shared tracing space</div>
    <input class="gate-input" id="nameInput" type="text" placeholder="your name" maxlength="24" autofocus>
    <br>
    <button class="gate-btn" id="enterBtn">Enter</button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar">
  <div class="tb-brand">Community Field</div>

  <button class="tb-btn" onclick="doAction('note')" title="Drop a note">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span>Note</span>
  </button>
  <button class="tb-btn" onclick="doAction('photo')" title="Upload photo">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <span>Photo</span>
  </button>
  <button class="tb-btn" onclick="doAction('draw')" title="Draw">
    <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
    <span>Draw</span>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="doAction('audio')" title="Upload audio">
    <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <span>Audio</span>
  </button>
  <button class="tb-btn" onclick="doAction('record')" title="Record">
    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    <span>Record</span>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="doAction('radio')" title="Subversive Radio">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49"/><path d="M7.76 16.24a6 6 0 010-8.49"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M4.93 19.07a10 10 0 010-14.14"/></svg>
    <span>Radio</span>
  </button>

  <div class="live-pill" id="livePill" onclick="toggleLiveList()">
    <span class="dot"></span> LIVE <span id="liveCount">0</span>
  </div>

  <div class="tb-info">
    <span id="onlineCount">0 online</span>
    <span id="coords"></span>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="modal" id="noteModal">
  <div class="modal-box">
    <div class="modal-head">Drop a Note <button class="modal-close" onclick="closeModal('noteModal')">&times;</button></div>
    <div class="modal-body">
      <div class="field-group">
        <label>Your note</label>
        <textarea id="noteText" rows="4" maxlength="280" placeholder="Write something..."></textarea>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:12px">Click on the map to place it, or it drops at center.</div>
      <button class="modal-submit" onclick="submitNote()">Place on Map</button>
    </div>
  </div>
</div>

<!-- PHOTO MODAL -->
<div class="modal" id="photoModal">
  <div class="modal-box">
    <div class="modal-head">Upload Photo <button class="modal-close" onclick="closeModal('photoModal')">&times;</button></div>
    <div class="modal-body">
      <div class="field-group">
        <label>Image</label>
        <input type="file" id="photoFile" accept="image/*" style="font-family:var(--font);font-size:12px">
      </div>
      <div class="field-group">
        <label>Caption (optional)</label>
        <input type="text" id="photoCaption" placeholder="..." maxlength="200">
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:12px">Click on the map to place it, or it drops at center.</div>
      <button class="modal-submit" onclick="submitPhoto()">Place on Map</button>
    </div>
  </div>
</div>

<!-- DRAW OVERLAY -->
<div class="draw-overlay" id="drawOverlay">
  <div class="draw-toolbar">
    <button class="active" data-size="2" onclick="setDrawSize(2,this)">Fine</button>
    <button data-size="4" onclick="setDrawSize(4,this)">Medium</button>
    <button data-size="8" onclick="setDrawSize(8,this)">Bold</button>
    <button onclick="undoDraw()">Undo</button>
    <button onclick="clearDraw()">Clear</button>
    <button onclick="saveDraw()" style="font-weight:600;color:var(--fg)">Save</button>
    <button onclick="cancelDraw()">Cancel</button>
  </div>
  <canvas class="draw-canvas" id="drawCanvas"></canvas>
</div>

<!-- UPLOAD TOAST -->
<div class="upload-toast" id="uploadToast">uploading...</div>

<!-- HIDDEN -->
<input type="file" id="audioFileInput" accept="audio/*" style="display:none">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
// ---- STATE ------------------------------------------------------------------
const S = {
  userId: null, userName: '', map: null, pendingLatLng: null, activeModal: null,
  myMarker: null, myPath: null, myTrail: [], watchId: null
};
let socket = null;
let audioCtx = null;
let userCount = 0;
const pins = new Map();
const liveStations = new Map();

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ---- MAP SETUP --------------------------------------------------------------
function initMap() {
  S.map = L.map('map', {
    center: [0, 0],
    zoom: 2,
    zoomControl: true,
    attributionControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(S.map);

  S.map.on('click', e => {
    S.pendingLatLng = e.latlng;
    document.getElementById('coords').textContent =
      e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4);
  });

  S.map.on('mousemove', e => {
    document.getElementById('coords').textContent =
      e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4);
  });

  startTracking();
}

// ---- GEOLOCATION & PATH TRACING ---------------------------------------------
function startTracking() {
  if (!navigator.geolocation) return;

  S.myPath = L.polyline([], {
    color: '#111', weight: 2, opacity: .5,
    dashArray: '4 6', lineCap: 'round'
  }).addTo(S.map);

  const youIcon = L.divIcon({
    className: 'you-marker',
    html: '<div class="you-dot"><div class="you-pulse"></div></div>',
    iconSize: [20, 20], iconAnchor: [10, 10]
  });

  navigator.geolocation.getCurrentPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    S.map.setView(ll, 15);
    S.myMarker = L.marker(ll, { icon: youIcon, zIndexOffset: 1000 }).addTo(S.map);
    S.myTrail.push(ll);
    S.myPath.addLatLng(ll);
    S.pendingLatLng = { lat: ll[0], lng: ll[1] };
  }, () => {}, { enableHighAccuracy: true });

  S.watchId = navigator.geolocation.watchPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (S.myMarker) S.myMarker.setLatLng(ll);
    else {
      S.myMarker = L.marker(ll, { icon: youIcon, zIndexOffset: 1000 }).addTo(S.map);
      S.map.setView(ll, 15);
    }
    const last = S.myTrail[S.myTrail.length - 1];
    if (!last || distLL(last, ll) > 0.00005) {
      S.myTrail.push(ll);
      S.myPath.addLatLng(ll);
    }
    S.pendingLatLng = { lat: ll[0], lng: ll[1] };
    document.getElementById('coords').textContent =
      ll[0].toFixed(4) + ', ' + ll[1].toFixed(4);
  }, () => {}, { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 });
}

function distLL(a, b) {
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2);
}

// ---- GATE -------------------------------------------------------------------
document.getElementById('enterBtn').addEventListener('click', enter);
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') enter(); });

function enter() {
  S.userName = document.getElementById('nameInput').value.trim() || 'anonymous';
  document.getElementById('gate').style.display = 'none';
  document.getElementById('toolbar').classList.add('visible');
  initMap();
  connectSocket();
}

// ---- SOCKET -----------------------------------------------------------------
function connectSocket() {
  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    socket.emit('join-room', { roomId: 'default', name: S.userName });
  });

  socket.on('room-state', data => {
    S.userId = data.userId;
    userCount = data.users.length;
    updateOnline();

    data.notes.forEach(n => { if (!pins.has(n.id)) addNotePin(n); });
    data.stations.forEach(st => { if (!pins.has(st.id)) addAudioPin(st); });
    if (data.photos) data.photos.forEach(p => { if (!pins.has(p.id)) addPhotoPin(p); });
    if (data.drawings) data.drawings.forEach(d => { if (!pins.has(d.id)) addDrawingPin(d); });
  });

  socket.on('user-count', c => { userCount = c; updateOnline(); });

  socket.on('note-placed', n => { if (!pins.has(n.id)) addNotePin(n); });
  socket.on('note-removed', id => removePin(id));

  socket.on('station-placed', st => { if (!pins.has(st.id)) addAudioPin(st); });
  socket.on('station-removed', id => { removePin(id); liveStations.delete(id); updateLive(); });
  socket.on('station-audio', data => {
    const p = pins.get(data.stationId);
    if (p) { p.data.audioFileId = data.audioFileId; p.data.hasAudio = true; }
  });
  socket.on('station-live', data => {
    const p = pins.get(data.stationId);
    if (p) { p.data.live = true; updatePinIcon(p); }
    liveStations.set(data.stationId, { id: data.stationId, name: p ? p.data.name : 'live' });
    updateLive();
  });
  socket.on('station-off-air', id => {
    const p = pins.get(id);
    if (p) { p.data.live = false; updatePinIcon(p); }
    liveStations.delete(id);
    updateLive();
  });

  socket.on('photo-placed', p => { if (!pins.has(p.id)) addPhotoPin(p); });
  socket.on('photo-removed', id => removePin(id));

  socket.on('drawing-placed', d => { if (!pins.has(d.id)) addDrawingPin(d); });
  socket.on('drawing-removed', id => removePin(id));

  socket.on('live-audio', data => {
    const p = pins.get(data.stationId);
    if (p && p.data.live && data.audio) playLivePCM(data.audio);
  });

  socket.on('kicked', msg => { alert(msg); location.reload(); });
}

function updateOnline() {
  document.getElementById('onlineCount').textContent = userCount + ' online';
}

// ---- PIN SYSTEM -------------------------------------------------------------
function makeIcon(type, live) {
  const icons = { note: '&#9998;', audio: '&#9835;', photo: '&#9673;', drawing: '&#9997;' };
  const cls = live ? 'live' : type;
  return L.divIcon({
    className: 'pin-marker',
    html: `<div class="pin-icon ${cls}">${icons[type] || '&#8226;'}</div>`,
    iconSize: [32, 32], iconAnchor: [16, 16]
  });
}

function getLatLng(item) {
  if (item.lat != null && item.lng != null) return [item.lat, item.lng];
  const c = S.map.getCenter();
  return [c.lat + (Math.random() - .5) * .01, c.lng + (Math.random() - .5) * .01];
}

function addNotePin(n) {
  const ll = getLatLng(n);
  const marker = L.marker(ll, { icon: makeIcon('note') }).addTo(S.map);
  const html = `<div class="card"><div class="card-body">
    <div class="card-text">${esc(n.text)}</div>
    <div class="card-meta"><span class="card-author">${esc(n.author || '?')}</span><span>${n.time || ''}</span></div>
  </div></div>`;
  marker.bindPopup(html, { maxWidth: 300 });
  pins.set(n.id, { marker, type: 'note', data: n });
}

function addPhotoPin(p) {
  const ll = getLatLng(p);
  const marker = L.marker(ll, { icon: makeIcon('photo') }).addTo(S.map);
  const cap = p.caption ? `<div class="card-text">${esc(p.caption)}</div>` : '';
  const html = `<div class="card">
    <img class="card-img" src="/api/image/${p.fileId}" alt="photo" loading="lazy">
    <div class="card-body">${cap}
      <div class="card-meta"><span class="card-author">${esc(p.author || '?')}</span><span>${fmtTime(p.time)}</span></div>
    </div></div>`;
  marker.bindPopup(html, { maxWidth: 320 });
  pins.set(p.id, { marker, type: 'photo', data: p });
}

function addAudioPin(st) {
  const ll = getLatLng(st);
  const marker = L.marker(ll, { icon: makeIcon('audio', st.live) }).addTo(S.map);
  marker.on('click', () => openAudioPopup(st, marker));
  pins.set(st.id, { marker, type: 'audio', data: st });
  if (st.live) {
    liveStations.set(st.id, { id: st.id, name: st.name || 'live' });
    updateLive();
  }
}

function openAudioPopup(st, marker) {
  ensureAudio();
  const id = st.id;
  const html = `<div class="card"><div class="audio-card">
    <div class="audio-title">${esc(st.name || 'untitled')}</div>
    <div class="audio-wave" id="wave_${id}">${Array(24).fill(0).map(() => '<div class="audio-bar" style="height:3px"></div>').join('')}</div>
    <div class="audio-controls">
      <button class="audio-play" id="playbtn_${id}" onclick="toggleAudio('${id}')">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <span class="audio-time" id="time_${id}">0:00</span>
      <input type="range" class="audio-vol" min="0" max="100" value="80" oninput="setVol('${id}',this.value)">
    </div>
    <div class="card-meta" style="margin-top:10px"><span class="card-author">${esc(st.owner || '')}</span><span>${st.live ? 'LIVE' : ''}</span></div>
  </div></div>`;
  marker.bindPopup(html, { maxWidth: 280 }).openPopup();

  if (st.audioFileId && !st.live) {
    setTimeout(() => loadPinAudio(st), 100);
  }
}

const audioPlayers = new Map();

function loadPinAudio(st) {
  if (audioPlayers.has(st.id)) return;
  const audio = new Audio('/api/audio/' + st.audioFileId);
  audio.volume = 0.8;
  audioPlayers.set(st.id, audio);

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const t = document.getElementById('time_' + st.id);
    if (t) {
      const m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60);
      t.textContent = m + ':' + s.toString().padStart(2, '0');
    }
    const bars = document.querySelectorAll('#wave_' + st.id + ' .audio-bar');
    const pct = audio.currentTime / audio.duration;
    bars.forEach((b, i) => {
      const active = i / bars.length <= pct;
      b.classList.toggle('active', active);
      b.style.height = (active ? 8 + Math.random() * 20 : 3) + 'px';
    });
  });
}

function toggleAudio(id) {
  const audio = audioPlayers.get(id);
  if (!audio) return;
  if (audio.paused) { audio.play().catch(() => {}); }
  else { audio.pause(); }
}

function setVol(id, val) {
  const audio = audioPlayers.get(id);
  if (audio) audio.volume = val / 100;
}

function addDrawingPin(d) {
  const ll = getLatLng(d);
  const marker = L.marker(ll, { icon: makeIcon('drawing') }).addTo(S.map);
  let svgPaths = '';
  if (d.paths) {
    d.paths.forEach(p => {
      svgPaths += `<path d="${p.d}" stroke="${p.color||'#111'}" stroke-width="${p.w||2}" fill="none" stroke-linecap="round"/>`;
    });
  }
  const html = `<div class="card"><div class="drawing-card">
    <svg viewBox="0 0 300 300" width="300" height="300" style="background:#fff">${svgPaths}</svg>
  </div><div class="card-body">
    <div class="card-meta"><span class="card-author">${esc(d.author || '?')}</span><span>${fmtTime(d.time)}</span></div>
  </div></div>`;
  marker.bindPopup(html, { maxWidth: 320 });
  pins.set(d.id, { marker, type: 'drawing', data: d });
}

function updatePinIcon(p) {
  if (!p || !p.marker) return;
  p.marker.setIcon(makeIcon(p.type, p.data.live));
}

function removePin(id) {
  const p = pins.get(id);
  if (!p) return;
  if (p.marker) S.map.removeLayer(p.marker);
  const audio = audioPlayers.get(id);
  if (audio) { audio.pause(); audio.src = ''; audioPlayers.delete(id); }
  pins.delete(id);
}

// ---- ACTIONS ----------------------------------------------------------------
function doAction(action) {
  switch (action) {
    case 'note': openModal('noteModal'); break;
    case 'photo': openModal('photoModal'); break;
    case 'draw': openDrawOverlay(); break;
    case 'audio': document.getElementById('audioFileInput').click(); break;
    case 'record': openRecorder(); break;
    case 'radio': openRadio(); break;
  }
}

function openModal(id) {
  S.activeModal = id;
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  S.activeModal = null;
}

// ---- NOTE -------------------------------------------------------------------
function submitNote() {
  const text = document.getElementById('noteText').value.trim();
  if (!text) return;
  const ll = S.pendingLatLng || S.map.getCenter();
  socket.emit('place-note', { text, lat: ll.lat, lng: ll.lng, x: 0, y: 0 });
  document.getElementById('noteText').value = '';
  closeModal('noteModal');
  S.pendingLatLng = null;
}

// ---- PHOTO ------------------------------------------------------------------
async function submitPhoto() {
  const file = document.getElementById('photoFile').files[0];
  if (!file) return;
  const caption = document.getElementById('photoCaption').value.trim();
  showToast('uploading...');

  const fd = new FormData();
  fd.append('image', file);
  const res = await fetch('/api/image/upload', { method: 'POST', body: fd });
  const data = await res.json();
  hideToast();

  if (data.fileId) {
    const ll = S.pendingLatLng || S.map.getCenter();
    socket.emit('place-photo', { fileId: data.fileId, caption, lat: ll.lat, lng: ll.lng });
  }
  document.getElementById('photoFile').value = '';
  document.getElementById('photoCaption').value = '';
  closeModal('photoModal');
  S.pendingLatLng = null;
}

// ---- AUDIO UPLOAD -----------------------------------------------------------
document.getElementById('audioFileInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  showToast('uploading...');

  const fd = new FormData();
  fd.append('audio', file);
  const res = await fetch('/api/audio/upload', { method: 'POST', body: fd });
  const data = await res.json();
  hideToast();

  if (data.fileId) {
    const ll = S.pendingLatLng || S.map.getCenter();
    socket.emit('place-station', { name: file.name.replace(/\.[^.]+$/, ''), x: 0, y: 0, lat: ll.lat, lng: ll.lng });
    const handler = st => {
      if (st.owner !== S.userId) return;
      socket.off('station-placed', handler);
      socket.emit('station-audio', { stationId: st.id, audioFileId: data.fileId });
    };
    socket.on('station-placed', handler);
  }
  S.pendingLatLng = null;
});

// ---- RECORDER ---------------------------------------------------------------
let recState = null;
function openRecorder() {
  ensureAudio();
  if (recState) return;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: recorder.mimeType });
      showToast('uploading recording...');
      const fd = new FormData();
      fd.append('audio', blob, 'recording.webm');
      const res = await fetch('/api/audio/upload', { method: 'POST', body: fd });
      const data = await res.json();
      hideToast();
      if (data.fileId) {
        const ll = S.pendingLatLng || S.map.getCenter();
        socket.emit('place-station', { name: 'recording ' + new Date().toLocaleTimeString(), x: 0, y: 0, lat: ll.lat, lng: ll.lng });
        const handler = st => {
          if (st.owner !== S.userId) return;
          socket.off('station-placed', handler);
          socket.emit('station-audio', { stationId: st.id, audioFileId: data.fileId });
        };
        socket.on('station-placed', handler);
      }
      recState = null;
      S.pendingLatLng = null;
    };
    recorder.start();
    recState = { recorder, stream, start: Date.now() };
    showToast('recording... click Record again to stop');
  }).catch(() => {});
  if (recState && recState.recorder.state === 'recording') {
    recState.recorder.stop();
    hideToast();
  }
}

// ---- DRAWING ----------------------------------------------------------------
let drawPaths = [];
let drawCurrent = null;
let drawSize = 2;

function openDrawOverlay() {
  const overlay = document.getElementById('drawOverlay');
  overlay.classList.add('open');
  const canvas = document.getElementById('drawCanvas');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawPaths = [];

  canvas.onpointerdown = e => {
    drawCurrent = { d: `M${e.offsetX} ${e.offsetY}`, w: drawSize, color: '#111', points: [[e.offsetX, e.offsetY]] };
    canvas.setPointerCapture(e.pointerId);
  };
  canvas.onpointermove = e => {
    if (!drawCurrent) return;
    drawCurrent.d += ` L${e.offsetX} ${e.offsetY}`;
    drawCurrent.points.push([e.offsetX, e.offsetY]);
    redrawCanvas(ctx, canvas);
  };
  canvas.onpointerup = () => {
    if (drawCurrent) { drawPaths.push(drawCurrent); drawCurrent = null; }
  };
}

function redrawCanvas(ctx, canvas) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  [...drawPaths, drawCurrent].filter(Boolean).forEach(p => {
    ctx.beginPath();
    p.points.forEach((pt, i) => { i === 0 ? ctx.moveTo(pt[0], pt[1]) : ctx.lineTo(pt[0], pt[1]); });
    ctx.strokeStyle = p.color;
    ctx.lineWidth = p.w;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  });
}

function setDrawSize(size, btn) {
  drawSize = size;
  document.querySelectorAll('.draw-toolbar button[data-size]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function undoDraw() {
  drawPaths.pop();
  const canvas = document.getElementById('drawCanvas');
  redrawCanvas(canvas.getContext('2d'), canvas);
}
function clearDraw() {
  drawPaths = [];
  const canvas = document.getElementById('drawCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}
function cancelDraw() { document.getElementById('drawOverlay').classList.remove('open'); }
function saveDraw() {
  if (drawPaths.length === 0) return cancelDraw();
  const scale = 300 / Math.max(window.innerWidth, window.innerHeight - 56);
  const normalized = drawPaths.map(p => ({
    d: p.points.map((pt, i) => (i === 0 ? 'M' : 'L') + (pt[0]*scale).toFixed(1) + ' ' + (pt[1]*scale).toFixed(1)).join(' '),
    w: p.w * scale, color: p.color
  }));
  const ll = S.pendingLatLng || S.map.getCenter();
  socket.emit('place-drawing', { paths: normalized, lat: ll.lat, lng: ll.lng });
  document.getElementById('drawOverlay').classList.remove('open');
  S.pendingLatLng = null;
}

// ---- RADIO ------------------------------------------------------------------
let radioAudio = null;
function openRadio() {
  ensureAudio();
  if (radioAudio) { radioAudio.paused ? radioAudio.play().catch(()=>{}) : radioAudio.pause(); return; }
  radioAudio = new Audio('/api/radio/stream');
  radioAudio.volume = 0.8;
  radioAudio.play().catch(() => {});
  showToast('Subversive Radio playing');
  setTimeout(hideToast, 2000);
}

// ---- LIVE PCM ---------------------------------------------------------------
function playLivePCM(buffer) {
  ensureAudio();
  if (!audioCtx) return;
  const i16 = new Int16Array(buffer);
  const f32 = new Float32Array(i16.length);
  for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
  const ab = audioCtx.createBuffer(1, f32.length, 16000);
  ab.getChannelData(0).set(f32);
  const src = audioCtx.createBufferSource();
  src.buffer = ab;
  src.connect(audioCtx.destination);
  src.start();
}

// ---- LIVE INDICATOR ---------------------------------------------------------
function updateLive() {
  const pill = document.getElementById('livePill');
  const count = liveStations.size;
  pill.classList.toggle('visible', count > 0);
  document.getElementById('liveCount').textContent = count;
}
function toggleLiveList() {
  liveStations.forEach(st => {
    const p = pins.get(st.id);
    if (p && p.marker) { S.map.setView(p.marker.getLatLng(), 14); p.marker.openPopup(); }
  });
}

// ---- HELPERS ----------------------------------------------------------------
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmtTime(t) { if (!t) return ''; try { return new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); } catch(e) { return t; } }
function showToast(msg) { const t = document.getElementById('uploadToast'); t.textContent = msg; t.classList.add('visible'); }
function hideToast() { document.getElementById('uploadToast').classList.remove('visible'); }

// close modals on backdrop click
document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
});
</script>
